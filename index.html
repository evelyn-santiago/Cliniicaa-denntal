<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica Dental Sonrisa Perfecta :</title>
    <style>
        :root {
            --primary: #2a9d8f;
            --secondary: #264653;
            --accent: #e9c46a;
            --light: #f8f9fa;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: fadeIn 0.5s ease-in-out;
        }

        .login-header {
            background-color: var(--primary);
            color: var(--white);
            padding: 25px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .login-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .login-body {
            padding: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            display: block;
            background-color: var(--white);
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(42, 157, 143, 0.2);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #238f81;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            text-align: center;
            padding: 15px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #666;
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Mensaje de error */
        .alert {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .alert-error {
            background-color: #ffe3e3;
            color: #c0392b;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="https://static.vecteezy.com/system/resources/previews/017/765/385/original/cute-teeth-cartoon-character-isolated-on-white-background-free-vector.jpg"
                alt="Logo Clínica Dental" class="logo">
            <h1>Clínica Dental Sonrisa Perfecta :p </h1>
            <p>Sistema de gestión odontológica</p>
        </div>

        <div class="login-body">
            <!-- Alerta de errores -->
            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" class="form-control" placeholder="Ingrese su usuario" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña"
                        required autocomplete="current-password">
                </div>

                <button type="submit" class="btn" id="btnLogin">Iniciar Sesión</button>
            </form>
        </div>

        <div class="login-footer">
            <p>¿Olvidó su contraseña? <a href="#">Recuperar aquí</a></p>
            <p>© 2025 Clínica Dental Sonrisa Perfecta. Todos los derechos reservados.</p>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────
        //  URL base de la API (ajustar si cambias el puerto)
        // ─────────────────────────────────────────────────────
        const API_BASE = '/api';

        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const alertError = document.getElementById('alertError');
        const alertSuccess = document.getElementById('alertSuccess');

        function showAlert(el, mensaje) {
            el.textContent = mensaje;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const usuario = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            btnLogin.disabled = true;
            btnLogin.textContent = 'Verificando...';

            try {
                const response = await fetch(`${API_BASE}/login.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Guardar datos del usuario en sessionStorage
                    sessionStorage.setItem('usuario', JSON.stringify(data.usuario));

                    showAlert(alertSuccess, '¡Bienvenido! Redirigiendo...');
                    setTimeout(() => {
                        window.location.href = 'panel.html';
                    }, 800);
                } else {
                    showAlert(alertError, data.error || 'Usuario o contraseña incorrectos');
                }
            } catch (err) {
                showAlert(alertError, '⚠️ No se puede conectar con el servidor. ¿Está XAMPP activo?');
                console.error('Error de conexión:', err);
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>

</html>
